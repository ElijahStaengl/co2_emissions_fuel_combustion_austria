name: Update Website

on:
  schedule:
    # Run every day at 06:00 UTC
    - cron: '0 2 * * *'

  # Allow manual execution from the GitHub Actions tab
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      # Download the repository files to the GitHub runner
      - name: Checkout repository
        uses: actions/checkout@v4

      # Install Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Install all packages from requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt

      # Execute your script
      - name: Run update script
        run: python main.py

      # Commit and push newly generated files
      - name: Commit changes
        run: |
            git config --global user.name "github-actions[bot]"
            git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

            git add .
            git diff --staged --quiet || git commit -m "Automatic website update"
            git push