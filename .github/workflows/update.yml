name: Update Website

on:
  schedule:
    # Run every day at 06:00 UTC
    - cron: '0 6 * * *'

  # Allow manual execution from the GitHub Actions tab
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      # Download the repository files to the GitHub runner
      - name: Checkout repository
        uses: actions/checkout@v4

      # Install Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Install all packages from requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt

      # Execute your script
      - name: Run update script
        run: python main.py

      # Commit and push newly generated files
      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Automatic website update"